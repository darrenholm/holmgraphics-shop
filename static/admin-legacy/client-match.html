<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Matching — Holm Graphics Admin</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2a2d3e; --accent: #2CA01C; --accent-light: #3dba2a;
      --text: #e2e8f0; --muted: #94a3b8; --dim: #4a5568;
      --danger: #ef4444; --warn: #f59e0b; --success: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    .logo { font-weight: 900; font-size: 1.3rem; color: var(--accent); }
    .header h1 { font-size: 1.2rem; font-weight: 700; }
    .back { color: var(--muted); text-decoration: none; font-size: 0.9rem; margin-left: auto; }

    .page { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }

    .alert { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
    .alert.show { display: block; }
    .alert.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: var(--success); }
    .alert.error   { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.25);  color: var(--danger); }

    .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; }
    .tab { background: none; border: none; border-bottom: 3px solid transparent; padding: 10px 20px; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--muted); margin-bottom: -2px; transition: all .15s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-badge { background: var(--surface2); border-radius: 99px; padding: 1px 8px; font-size: 0.75rem; margin-left: 6px; }

    .section { display: none; }
    .section.active { display: block; }

    /* Match Cards */
    .match-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.2rem 1.5rem;
      margin-bottom: 1rem; display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      gap: 1rem; align-items: center;
    }
    .match-card.confirmed { border-color: rgba(34,197,94,.4); background: rgba(34,197,94,.04); }
    .match-card.skipped   { opacity: .45; }

    .client-box { }
    .client-box .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .client-box .name  { font-size: 1rem; font-weight: 700; color: var(--text); }
    .client-box .sub   { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .client-box .score { font-size: 0.75rem; color: var(--warn); margin-top: 4px; }

    .match-arrow { font-size: 1.5rem; color: var(--dim); padding: 0 0.5rem; }

    .match-actions { display: flex; flex-direction: column; gap: 0.5rem; min-width: 130px; }
    .btn { padding: 0.5rem 1rem; border-radius: 8px; border: none; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all .15s; text-align: center; }
    .btn-confirm  { background: var(--accent); color: #fff; }
    .btn-confirm:hover { background: var(--accent-light); }
    .btn-skip     { background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--border); }
    .btn-skip:hover { background: rgba(255,255,255,.1); }
    .btn-create   { background: rgba(44,160,28,.15); color: var(--accent); border: 1px solid rgba(44,160,28,.3); }
    .btn-create:hover { background: rgba(44,160,28,.25); }
    .btn-browse   { background: rgba(99,102,241,.15); color: #818cf8; border: 1px solid rgba(99,102,241,.3); }
    .btn-browse:hover { background: rgba(99,102,241,.25); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Unmatched section */
    .unmatched-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
    }
    .unmatched-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .unmatched-header .name { font-size: 1rem; font-weight: 700; }
    .unmatched-header .sub  { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .unmatched-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    /* QB Search Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; width: 560px; max-width: 95vw; max-height: 80vh; display: flex; flex-direction: column; gap: 1rem; }
    .modal h3 { font-size: 1rem; font-weight: 700; }
    .modal-sub { font-size: 0.85rem; color: var(--muted); }
    .modal input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 1rem; color: var(--text); font-size: 0.875rem; width: 100%; }
    .modal input:focus { outline: none; border-color: var(--accent); }
    .modal-results { flex: 1; overflow-y: auto; max-height: 320px; }
    .qb-result { padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .qb-result:hover { background: var(--surface2); }
    .qb-result .qname { font-weight: 600; font-size: 0.9rem; }
    .qb-result .qsub  { font-size: 0.78rem; color: var(--muted); }
    .qb-result .qid   { font-size: 0.72rem; color: var(--dim); font-family: monospace; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; }
    .btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.82rem; }

    .empty { text-align: center; padding: 3rem; color: var(--muted); font-style: italic; }
    .loading { text-align: center; padding: 2rem; color: var(--muted); }

    .progress-bar { height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 1rem; display: none; }
    .progress-bar.active { display: block; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; animation: indeterminate 1.5s infinite; }
    @keyframes indeterminate { 0% { width: 0%; margin-left: 0; } 50% { width: 60%; margin-left: 20%; } 100% { width: 0%; margin-left: 100%; } }

    .summary-bar { background: var(--surface2); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; color: var(--muted); display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .summary-bar span { color: var(--text); font-weight: 600; }
  </style>
</head>
<body>

<div class="header">
  <span class="logo">HG</span>
  <h1>Manual Client Matching</h1>
  <a href="admin-clients-sync.html" class="back">← Client Sync</a>
</div>

<div class="page">
  <div id="alert" class="alert"></div>
  <div class="progress-bar" id="main-progress"><div class="progress-fill"></div></div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('suggested', this)">
      Suggested Matches <span class="tab-badge" id="badge-suggested">…</span>
    </button>
    <button class="tab" onclick="showTab('unmatched', this)">
      No Match Found <span class="tab-badge" id="badge-unmatched">…</span>
    </button>
  </div>

  <!-- Suggested Matches Tab -->
  <div class="section active" id="tab-suggested">
    <div class="summary-bar" id="suggested-summary" style="display:none">
      <div>Suggested: <span id="sum-total">0</span></div>
      <div>Confirmed: <span id="sum-confirmed" style="color:var(--success)">0</span></div>
      <div>Skipped: <span id="sum-skipped" style="color:var(--muted)">0</span></div>
      <div>Remaining: <span id="sum-remaining">0</span></div>
    </div>
    <div id="suggested-list"><div class="loading">Loading suggestions…</div></div>
  </div>

  <!-- Unmatched Tab -->
  <div class="section" id="tab-unmatched">
    <div id="unmatched-list"><div class="loading">Loading unmatched clients…</div></div>
  </div>
</div>

<!-- QB Search Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Find QuickBooks Customer</h3>
    <p class="modal-sub" id="modal-sub">Matching for: <strong id="modal-client-name"></strong></p>
    <input type="text" id="modal-search" placeholder="Search QB customers…" oninput="searchQB()">
    <div class="modal-results" id="modal-results">
      <div class="loading">Start typing to search…</div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = 'https://holmgraphics-shop-api-production.up.railway.app/api/quickbooks';
let authToken = localStorage.getItem('auth_token') || '';
let allQBCustomers = [];
let unmatchedClients = [];
let suggestedMatches = [];
let modalClientId = null;
let confirmedCount = 0;
let skippedCount = 0;

function headers() {
  return { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' };
}

function showAlert(msg, type = 'success') {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = `alert ${type} show`;
  setTimeout(() => el.classList.remove('show'), 5000);
}

function showTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function showProgress(show) {
  document.getElementById('main-progress').classList.toggle('active', show);
}

// ── Fuzzy match score (0-100) ──────────────────────────────────────────────
function similarity(a, b) {
  a = (a || '').toLowerCase().trim();
  b = (b || '').toLowerCase().trim();
  if (!a || !b) return 0;
  if (a === b) return 100;
  if (a.includes(b) || b.includes(a)) return 85;

  // Bigram similarity
  function bigrams(s) {
    const b = new Set();
    for (let i = 0; i < s.length - 1; i++) b.add(s.slice(i, i+2));
    return b;
  }
  const ba = bigrams(a), bb = bigrams(b);
  const intersection = [...ba].filter(x => bb.has(x)).length;
  const score = (2 * intersection) / (ba.size + bb.size) * 100;
  return Math.round(score);
}

function clientDisplayName(c) {
  return c.company || [c.fname, c.lname].filter(Boolean).join(' ') || c.email || `Client #${c.id}`;
}

function qbDisplayName(q) {
  return q.DisplayName || q.CompanyName || [q.GivenName, q.FamilyName].filter(Boolean).join(' ') || '';
}

// ── Load everything ────────────────────────────────────────────────────────
async function loadAll() {
  showProgress(true);
  try {
    // Load local unsynced clients
    const clientRes = await fetch(`${API}/clients/list`, { headers: headers() });
    const allClients = await clientRes.json();
    unmatchedClients = allClients.filter(c => !c.qb_customer_id);

    // Load all QB customers
    const qbRes = await fetch(`${API}/clients/qb-list`, { headers: headers() });
    if (qbRes.ok) {
      allQBCustomers = await qbRes.json();
    }

    buildSuggestions();
    renderUnmatched();
  } catch(e) {
    showAlert('Failed to load: ' + e.message, 'error');
  } finally {
    showProgress(false);
  }
}

function buildSuggestions() {
  suggestedMatches = [];

  for (const client of unmatchedClients) {
    const localName = clientDisplayName(client);
    let bestMatch = null;
    let bestScore = 0;

    for (const qb of allQBCustomers) {
      const qbName = qbDisplayName(qb);
      let score = similarity(localName, qbName);

      // Boost score if emails match
      if (client.email && qb.PrimaryEmailAddr?.Address &&
          client.email.toLowerCase() === qb.PrimaryEmailAddr.Address.toLowerCase()) {
        score = Math.max(score, 95);
      }

      if (score > bestScore) {
        bestScore = score;
        bestMatch = qb;
      }
    }

    // Only suggest if score is between 40-99 (not exact, not too distant)
    if (bestScore >= 40 && bestScore < 100) {
      suggestedMatches.push({ client, qbMatch: bestMatch, score: bestScore, status: 'pending' });
    }
  }

  // Sort by score descending
  suggestedMatches.sort((a, b) => b.score - a.score);

  document.getElementById('badge-suggested').textContent = suggestedMatches.length;
  document.getElementById('badge-unmatched').textContent =
    unmatchedClients.filter(c => !suggestedMatches.find(s => s.client.id === c.id)).length;

  renderSuggested();
}

function renderSuggested() {
  const list = document.getElementById('suggested-list');
  const summary = document.getElementById('suggested-summary');

  if (!suggestedMatches.length) {
    list.innerHTML = `<div class="empty">No suggested matches found. All unsynced clients are in the "No Match Found" tab.</div>`;
    return;
  }

  summary.style.display = 'flex';
  const total = suggestedMatches.length;
  const confirmed = suggestedMatches.filter(m => m.status === 'confirmed').length;
  const skipped = suggestedMatches.filter(m => m.status === 'skipped').length;
  document.getElementById('sum-total').textContent = total;
  document.getElementById('sum-confirmed').textContent = confirmed;
  document.getElementById('sum-skipped').textContent = skipped;
  document.getElementById('sum-remaining').textContent = total - confirmed - skipped;

  list.innerHTML = suggestedMatches.map((m, i) => {
    const localName = clientDisplayName(m.client);
    const qbName = qbDisplayName(m.qbMatch);
    const qbEmail = m.qbMatch.PrimaryEmailAddr?.Address || '';
    const scoreColor = m.score >= 80 ? 'var(--success)' : m.score >= 60 ? 'var(--warn)' : 'var(--danger)';

    return `
    <div class="match-card ${m.status}" id="match-${i}">
      <div class="client-box">
        <div class="label">Your Database</div>
        <div class="name">${localName}</div>
        <div class="sub">${m.client.email || '—'}</div>
        <div class="sub" style="color:var(--dim);font-size:0.75rem">ID: ${m.client.id}</div>
      </div>

      <div class="match-arrow">↔</div>

      <div class="client-box">
        <div class="label">QuickBooks Customer</div>
        <div class="name">${qbName}</div>
        <div class="sub">${qbEmail || '—'}</div>
        <div class="score" style="color:${scoreColor}">Match score: ${m.score}%</div>
      </div>

      <div class="match-actions">
        ${m.status === 'pending' ? `
          <button class="btn btn-confirm" onclick="confirmMatch(${i})">✅ Confirm Match</button>
          <button class="btn btn-skip"    onclick="skipMatch(${i})">Skip</button>
          <button class="btn btn-browse"  onclick="openModal(${m.client.id}, '${localName.replace(/'/g,"\\'")}')">🔍 Find Different</button>
        ` : m.status === 'confirmed' ? `
          <div style="color:var(--success);font-size:0.82rem;font-weight:600">✅ Matched!</div>
          <button class="btn btn-skip" onclick="undoMatch(${i})">Undo</button>
        ` : `
          <div style="color:var(--muted);font-size:0.82rem">Skipped</div>
          <button class="btn btn-confirm" onclick="resetMatch(${i})">Reconsider</button>
        `}
      </div>
    </div>`;
  }).join('');
}

function renderUnmatched() {
  const list = document.getElementById('unmatched-list');
  // Clients with no suggested match
  const noSuggestion = unmatchedClients.filter(
    c => !suggestedMatches.find(s => s.client.id === c.id)
  );

  if (!noSuggestion.length) {
    list.innerHTML = `<div class="empty">All unsynced clients have suggested matches. Check the Suggested Matches tab.</div>`;
    return;
  }

  list.innerHTML = noSuggestion.map(c => {
    const name = clientDisplayName(c);
    return `
    <div class="unmatched-card" id="unmatched-${c.id}">
      <div class="unmatched-header">
        <div>
          <div class="name">${name}</div>
          <div class="sub">${c.email || '—'} · ID: ${c.id}</div>
        </div>
        <div class="unmatched-actions">
          <button class="btn btn-browse" onclick="openModal(${c.id}, '${name.replace(/'/g,"\\'")}')">🔍 Find in QB</button>
          <button class="btn btn-create" onclick="createInQB(${c.id}, this)">➕ Create New in QB</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Confirm a suggested match ──────────────────────────────────────────────
async function confirmMatch(i) {
  const m = suggestedMatches[i];
  const btn = document.querySelector(`#match-${i} .btn-confirm`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }

  try {
    const res = await fetch(`${API}/clients/link`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ client_id: m.client.id, qb_customer_id: m.qbMatch.Id })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    suggestedMatches[i].status = 'confirmed';
    showAlert(`✅ ${clientDisplayName(m.client)} linked to QB customer ${qbDisplayName(m.qbMatch)}`);
    renderSuggested();
  } catch(e) {
    showAlert('Failed: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '✅ Confirm Match'; }
  }
}

function skipMatch(i) {
  suggestedMatches[i].status = 'skipped';
  renderSuggested();
}

function undoMatch(i) {
  // Note: this just unmarks in UI — doesn't remove the QB link from DB
  // For a true undo you'd need a separate API call
  suggestedMatches[i].status = 'skipped';
  renderSuggested();
}

function resetMatch(i) {
  suggestedMatches[i].status = 'pending';
  renderSuggested();
}

// ── Create new QB customer ─────────────────────────────────────────────────
async function createInQB(clientId, btn) {
  btn.disabled = true;
  btn.textContent = '⏳ Creating…';
  try {
    const res = await fetch(`${API}/clients/push/${clientId}`, { method: 'POST', headers: headers() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    showAlert(`✅ Created in QuickBooks! QB ID: ${data.qb_customer_id}`);
    document.getElementById(`unmatched-${clientId}`).style.opacity = '0.4';
    btn.textContent = '✅ Created';
  } catch(e) {
    showAlert('Failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '➕ Create New in QB';
  }
}

// ── Modal (manual QB search) ───────────────────────────────────────────────
function openModal(clientId, clientName) {
  modalClientId = clientId;
  document.getElementById('modal-client-name').textContent = clientName;
  document.getElementById('modal-search').value = clientName;
  document.getElementById('modal').classList.add('open');
  searchQB();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalClientId = null;
}

function searchQB() {
  const q = document.getElementById('modal-search').value.toLowerCase().trim();
  const results = document.getElementById('modal-results');

  if (!q) {
    results.innerHTML = '<div class="loading">Start typing to search…</div>';
    return;
  }

  const matches = allQBCustomers
    .filter(c => {
      const name = qbDisplayName(c).toLowerCase();
      const email = (c.PrimaryEmailAddr?.Address || '').toLowerCase();
      return name.includes(q) || email.includes(q);
    })
    .slice(0, 20);

  if (!matches.length) {
    results.innerHTML = '<div class="loading">No QB customers found</div>';
    return;
  }

  results.innerHTML = matches.map(c => {
    const name = qbDisplayName(c);
    const email = c.PrimaryEmailAddr?.Address || '';
    return `
    <div class="qb-result" onclick="selectQBCustomer('${c.Id}', '${name.replace(/'/g,"\\'")}')">
      <div>
        <div class="qname">${name}</div>
        <div class="qsub">${email}</div>
      </div>
      <div class="qid">${c.Id}</div>
    </div>`;
  }).join('');
}

async function selectQBCustomer(qbId, qbName) {
  if (!modalClientId) return;
  closeModal();

  try {
    const res = await fetch(`${API}/clients/link`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ client_id: modalClientId, qb_customer_id: qbId })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    showAlert(`✅ Linked to QuickBooks customer: ${qbName}`);

    // Remove from unmatched list
    const el = document.getElementById(`unmatched-${modalClientId}`);
    if (el) el.style.opacity = '0.4';

    // Update suggested match if it exists
    const idx = suggestedMatches.findIndex(m => m.client.id === modalClientId);
    if (idx >= 0) {
      suggestedMatches[idx].status = 'confirmed';
      renderSuggested();
    }

    // Reload to get fresh data
    setTimeout(loadAll, 1500);
  } catch(e) {
    showAlert('Failed to link: ' + e.message, 'error');
  }
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadAll();
</script>
</body>
</html>
